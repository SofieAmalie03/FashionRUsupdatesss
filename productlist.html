<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FashionRUs — Produkter</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./productlist.js" defer></script>
  </head>

  <body class="page">
    <a class="skip-link" href="#content">Spring til indhold</a>

    <header class="site-header" role="banner">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="FashionRUs Home">
          <div class="logo">Fashion<span class="r">R</span>Us</div>
        </a>

        <div class="header-actions">
          <div class="search" role="search">
            <input type="search" placeholder="Search" aria-label="Search" />
          </div>
        </div>
      </div>
    </header>

    <main id="content" class="container">
      <div class="section-head">
        <h1 id="pageTitle">Produkter</h1>
        <p class="hint" id="pageHint"></p>
      </div>

      <div class="filters">
        <button type="button" id="toggleFilters" class="all-filters">
          Alle filtre
        </button>

        <div class="filter-options" id="filterOptions" aria-label="Filtre">
          <button type="button">All</button>
          <button type="button">Unisex</button>
          <button type="button">Women</button>
          <button type="button">Men</button>
        </div>
      </div>

      <section
        class="product_list_container"
        id="productList"
        aria-label="Produkter"
      ></section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <div class="footer-brand">Fashion<span class="r">R</span>Us</div>
          <small class="footer-copy"
            >© FashionRUs — Mode til hele familien</small
          >
        </div>

        <nav class="footer-links" aria-label="Footer links">
          <a href="./index.html">Om os</a>
          <a href="./productlist.html">Job/Karriere</a>
          <a href="./product.html">Levering og Retur</a>
          <a href="#">Kontakt</a>
        </nav>

        <form
          class="footer-form"
          action="#"
          method="post"
          aria-label="Newsletter"
        >
          <label class="footer-label" for="newsletter">
            Tilmeld dig vores nyhedsbrev og få besked, når vi lancerer nye
            styles og favoritter.
          </label>

          <div class="footer-field">
            <input
              id="newsletter"
              type="email"
              placeholder="Din email"
              autocomplete="email"
            />
            <button type="submit" class="footer-btn" aria-label="Tilmeld">
              Tilmeld
            </button>
          </div>

          <p class="footer-hint">Ingen spam — kun når der er noget nyt.</p>
        </form>
      </div>
    </footer>
  </body>
</html>
