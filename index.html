<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FashionRUs — Kategorier</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./index.js" defer></script>
  </head>

  <body class="home">
    <a class="skip-link" href="#content">Spring til indhold</a>

    <header class="site-header" role="banner">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="FashionRUs Home">
          <div class="logo">Fashion<span class="r">R</span>Us</div>
        </a>

        <div class="header-actions">
          <div class="search" role="search">
            <input type="search" placeholder="Search" aria-label="Search" />
          </div>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero" aria-label="Hero">
      <img
        src="./img/ChatGPT Image 4. mar. 2026, 11.40.49.png"
        alt="Active family hero"
      />

      <div class="hero-overlay">
        <p class="hero-kicker">NEW IN • ACTIVE FAMILY</p>
        <h1 class="hero-title">MOVE DIFFERENT</h1>
        <p class="hero-sub">
          Premium activewear fra flere brands – til hele familien.
        </p>

        <div class="hero-buttons">
          <a href="#categories" class="btn">Shop Now</a>
          <a href="#categories" class="btn ghost">Explore</a>
        </div>
      </div>
    </section>

    <!-- KATEGORIER -->
    <main id="content" class="container">
      <div id="categories" class="section-head">
        <h2>Kategorier</h2>
      </div>

      <section
        class="category_list_container categoryList"
        aria-label="Kategorier"
      ></section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="container footer-inner">
        <div>
          <div class="footer-brand">Fashion<span class="r">R</span>Us</div>
          <small class="footer-copy"
            >© FashionRUs — Mode til hele familien</small
          >
        </div>
      </div>
    </footer>
  </body>
</html>
