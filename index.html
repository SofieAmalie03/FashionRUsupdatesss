<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FashionRUs — Kategorier</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <a class="skip-link" href="#content">Spring til indhold</a>

    <!-- HEADER -->
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="FashionRUs Home">
          <div class="logo">Fashion<span class="r">R</span>Us</div>
        </a>

        <nav class="nav" aria-label="Top navigation">
          <a href="./index.html">Categories</a>
          <a href="#">Brands</a>
          <a href="#">Seasons</a>
        </nav>

        <div class="header-actions">
          <div class="search" role="search">
            <svg
              class="icon"
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <path
                d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"
                stroke="currentColor"
                stroke-width="2"
              />
              <path
                d="M16.3 16.3 21 21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            <input type="search" placeholder="Search" aria-label="Search" />
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main id="content" class="container">
      <div class="section-head">
        <h2>Kategorier</h2>
      </div>

      <!-- 🔥 HER BLIVER KATEGORIER INDSAT DYNAMISK -->
      <section class="category_list_container categoryList"></section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer" aria-label="Footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <div class="footer-brand">Fashion<span class="r">R</span>Us</div>
          <small class="footer-copy">
            © FashionRUs — Mode til hele familie
          </small>
        </div>

        <nav class="footer-links" aria-label="Footer links">
          <a href="./index.html">Om os</a>
          <a href="./productlist.html">Job/Karriere</a>
          <a href="./product.html">Levering og Retur</a>
          <a href="#">Kontakt</a>
        </nav>

        <form
          class="footer-form"
          action="#"
          method="post"
          aria-label="Newsletter"
        >
          <label class="footer-label" for="newsletter">
            Tilmeld dig vores nyhedsbrev og få besked, når vi lancerer nye
            styles og favoritter.
          </label>

          <div class="footer-field">
            <input
              id="newsletter"
              type="email"
              placeholder="Din email"
              autocomplete="email"
            />
            <button type="submit" class="footer-btn">Tilmeld</button>
          </div>

          <p class="footer-hint">Ingen spam — kun når der er noget nyt.</p>
        </form>
      </div>
    </footer>

    <!-- 🔥 DYNAMISK JAVASCRIPT -->
    <script src="index.js"></script>
  </body>
</html>
